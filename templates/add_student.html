<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add Student - Smart Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="container my-4">
    <!-- Header -->
    <div class="row mb-4">
      <div class="col-12">
        <div class="card glass-card">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <h4 class="mb-1">
                <i class="fas fa-user-plus me-2"></i>Add New Student
              </h4>
              <p class="text-muted small mb-0">Register student and capture face images for recognition</p>
            </div>
            <a href="/" class="btn btn-outline-secondary">
              <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="card glass-card">
          <div class="card-body">
            <!-- Camera Status -->
            <div class="alert alert-info d-flex align-items-center mb-4" id="cameraInfo">
              <i class="fas fa-camera me-3 fs-5"></i>
              <div>
                <strong>Camera Status:</strong>
                <span class="ms-2">Loading camera configuration...</span>
              </div>
            </div>

            <!-- Student Form -->
            <form id="studentForm">
              <h5 class="mb-3">
                <i class="fas fa-id-card me-2"></i>Student Information
              </h5>
              <div class="row g-3 mb-4">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Full Name *</label>
                  <input class="form-control" name="name" placeholder="Enter student name" required>
                </div>
                <div class="col-md-3">
                  <label class="form-label fw-semibold">Roll Number</label>
                  <input class="form-control" name="roll" placeholder="e.g., 101">
                </div>
                <div class="col-md-3">
                  <label class="form-label fw-semibold">Registration No</label>
                  <input class="form-control" name="reg_no" placeholder="e.g., REG2024">
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Class</label>
                  <input class="form-control" name="class" placeholder="e.g., CSE,ME..">
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Section</label>
                  <input class="form-control" name="sec" placeholder="e.g., A">
                </div>
              </div>

              <!-- Action Buttons -->
              <div class="d-flex gap-2 align-items-center flex-wrap mb-4">
                <button id="saveInfoBtn" type="submit" class="btn btn-primary">
                  <i class="fas fa-save me-2"></i>Save Student Info
                </button>
                <select id="cameraSelect" class="form-select" style="max-width: 250px;" disabled>
                  <option value="">Loading cameras...</option>
                </select>
                <button id="startCaptureBtn" type="button" class="btn btn-warning" disabled>
                  <i class="fas fa-camera me-2"></i>Start Capture (50 images)
                </button>
                <button id="addStudentBtn" type="button" class="btn btn-success" disabled>
                  <i class="fas fa-check me-2"></i>Complete Registration
                </button>
                <a href="/camera_config" class="btn btn-outline-secondary">
                  <i class="fas fa-cog me-2"></i>Camera Settings
                </a>
              </div>
            </form>

            <hr class="my-4">

            <!-- Video Preview -->
            <h5 class="mb-3">
              <i class="fas fa-video me-2"></i>Camera Preview
            </h5>
            <div class="text-center">
              <video id="video" width="640" height="480" autoplay muted class="mb-3"></video>
              
              <!-- Capture Progress -->
              <div class="row justify-content-center">
                <div class="col-md-6">
                  <div class="card bg-light">
                    <div class="card-body">
                      <div id="captureStatus" class="mb-2 fw-semibold">
                        <i class="fas fa-images me-2"></i>Captured: 0 / 50 images
                      </div>
                      <div class="progress" style="height: 20px;">
                        <div id="progressBar" class="progress-bar bg-success" role="progressbar" style="width:0%">0%</div>
                      </div>
                      <p class="text-muted small mt-2 mb-0">
                        <i class="fas fa-info-circle me-1"></i>
                        Multiple angles help improve recognition accuracy
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/camera_add_student.js') }}"></script>
</body>
</html>
