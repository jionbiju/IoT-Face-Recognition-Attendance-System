<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart Attendance System - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="sidebar-container">
    <!-- Top Brand -->
    <div class="brand-header">
      <i class="fas fa-fingerprint me-2"></i>
      <span>VJEC Attendance System</span>
    </div>

    <!-- Quick Actions Card -->
    <div class="sidebar-card">
      <h6 class="card-title">Quick Actions</h6>
      <p class="card-subtitle">Create, manage, capture faces, or track recognition.</p>
      <div class="action-buttons">
        <a href="/add_student" class="action-btn btn-primary">
          <i class="fas fa-user-plus"></i> Add Student
        </a>
        <a href="/manage_students" class="action-btn btn-info">
          <i class="fas fa-users-cog"></i> Manage Students
        </a>
        <a href="/mark_attendance" class="action-btn btn-success">
          <i class="fas fa-camera"></i> Mark Attendance
        </a>
        <a href="/attendance_record" class="action-btn btn-warning">
          <i class="fas fa-clipboard-list"></i> View Records
        </a>
        <a href="/camera_config" class="action-btn btn-secondary">
          <i class="fas fa-cog"></i> Camera Config
        </a>
      </div>
    </div>

    <!-- Train Model Card -->
    <div class="sidebar-card">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="card-title mb-0">Train Model</h6>
        <button id="trainBtn" class="btn-train">Start Training</button>
      </div>
      <div class="progress-custom">
        <div id="trainProgress" class="progress-bar-custom" style="width:0%">0%</div>
      </div>
      <p id="trainMsg" class="train-msg">Model not trained yet.</p>
    </div>

    <!-- Attendance Chart Card -->
    <div class="sidebar-card">
      <h6 class="card-title">Attendance (Last 30 days)</h6>
      <div class="chart-wrapper">
        <canvas id="attendanceChart"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
